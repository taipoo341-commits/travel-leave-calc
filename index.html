<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>興達電廠路程假精算系統</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0d0f12">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="路程精算">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0d0f12; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        .neon-text-cyan { color: #00F0FF; text-shadow: 0 0 10px rgba(0, 240, 255, 0.8); }
        .neon-text-orange { color: #FFA500; text-shadow: 0 0 10px rgba(255, 165, 0, 0.8); }
        .neon-text-red { color: #FF3333; text-shadow: 0 0 10px rgba(255, 51, 51, 0.8); }
        .neon-border { border: 2px solid #00F0FF; box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); }
        
        .input-cyber { 
            background: #1a1f26; 
            border: 2px solid #ffffff; 
            color: #ffffff; 
            padding: 8px; 
            border-radius: 6px; 
            outline: none; 
            width: 100%;
            font-weight: bold;
            font-size: 16px; /* 避免 iOS Safari 自動放大畫面 */
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        .box-go { border: 1px solid rgba(0, 240, 255, 0.3); background: rgba(0, 240, 255, 0.05); }
        .box-back { border: 1px solid rgba(255, 165, 0, 0.3); background: rgba(255, 165, 0, 0.05); }
        .box-red { border: 2px solid #FF3333; background: rgba(255, 51, 51, 0.1); }
        select option { background: #1a1f26; color: white; }
    </style>
</head>
<body class="p-3 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const LOCATION_ALIASES = {
            "烏來": "新北", "通霄": "苗栗", "興達": "高雄", "南火": "高雄",
            "大林": "高雄", "大潭": "桃園", "核三": "屏東", "明潭": "南投",
            "大觀": "南投", "協和": "基隆"
        };

        const REGION_MAP = [
            { label: "苗栗(含)以北(含總處)", keywords: ["台北", "新北", "基隆", "桃園", "新竹", "苗栗", "林口", "林訓", "總處"], TRA: 6, THSR: 3, PLANE: 0 },
            { label: "台中(含)以南(含谷訓)", keywords: ["台中", "彰化", "南投", "雲林", "谷訓", "谷關"], TRA: 4, THSR: 2, PLANE: 0 },
            { label: "台南以北嘉義(含)以南", keywords: ["台南", "嘉義"], TRA: 2, THSR: 0, PLANE: 0 },
            { label: "台東", keywords: ["台東"], TRA: 4, THSR: 0, PLANE: 0 },
            { label: "宜蘭、花蓮", keywords: ["宜蘭", "花蓮"], TRA: 8, THSR: 0, PLANE: 0 },
            { label: "離島地區", keywords: ["金門", "澎湖", "馬祖"], TRA: 0, THSR: 0, PLANE: 4 }
        ];

        const SHIFT_TIME_INFO = {
            '1': { name: "一值", start: "22:45", end: "07:45" },
            '2': { name: "二值", start: "07:45", end: "15:45" },
            '2_3': { name: "二連一", start: "07:45", end: "14:15" },
            '3': { name: "三值", start: "15:45", end: "22:45" },
            '3_1': { name: "三值第一天", start: "14:15", end: "22:45" },
            '4': { name: "受訓", start: "08:00", end: "16:30" },
            '0': { name: "空班", start: null, end: null }
        };

        const CYCLE_DETAILS = [
            { code: '2', label: "二值" }, { code: '2', label: "二值" }, { code: '2_3', label: "二連一" },
            { code: '1', label: "一值" }, { code: '1', label: "一值" }, { code: '1', label: "一值" },
            { code: '0', label: "空班" }, { code: '0', label: "空班" },
            { code: '3_1', label: "三值第一天" }, { code: '3', label: "三值" }, { code: '3', label: "三值" },
            { code: '0', label: "空班" }
        ];
        
        const BASE_DATE = new Date(2026, 0, 1);
        const OFFSETS = { 'A': 0, 'B': 2, 'C': 6, 'D': 3 };

        const App = () => {
            const [shiftType, setShiftType] = useState("D");
            const [location, setLocation] = useState("");
            const [transport, setTransport] = useState("TRA");
            
            const [startDate, setStartDate] = useState("");
            const [goHour, setGoHour] = useState("00");
            const [goMin, setGoMin] = useState("00");
            const [manualStartShift, setManualStartShift] = useState("");
            
            const [endDate, setEndDate] = useState("");
            const [backHour, setBackHour] = useState("00");
            const [backMin, setBackMin] = useState("00");
            const [manualEndShift, setManualEndShift] = useState("");

            const currentRule = useMemo(() => {
                if (!location) return null;
                let searchString = location;
                for (const [alias, city] of Object.entries(LOCATION_ALIASES)) {
                    if (location.includes(alias)) searchString += ` ${city}`;
                }
                const match = REGION_MAP.find(r => r.keywords.some(k => searchString.includes(k)));
                if (match) return match;
                return { label: "非表列區域 (無路程假)", TRA: 0, THSR: 0, PLANE: 0, isZero: true };
            }, [location]);

            const getDetectedShiftInfo = (dateStr) => {
                if (!dateStr) return null;
                const current = new Date(dateStr);
                const diffDays = Math.round((current - BASE_DATE) / (1000 * 60 * 60 * 24));
                const index = ((diffDays % 12) + 12 + OFFSETS[shiftType]) % 12;
                return CYCLE_DETAILS[index]; 
            };

            const detectedStartInfo = useMemo(() => getDetectedShiftInfo(startDate), [startDate, shiftType]);
            const detectedEndInfo = useMemo(() => getDetectedShiftInfo(endDate), [endDate, shiftType]);

            const activeStartShiftCode = manualStartShift || (detectedStartInfo?.code === '0' ? '4' : detectedStartInfo?.code);
            const activeEndShiftCode = manualEndShift || (detectedEndInfo?.code === '0' ? '4' : detectedEndInfo?.code);

            const displayStartManual = manualStartShift || (detectedStartInfo?.code === '0' ? '4' : "");
            const displayEndManual = manualEndShift || (detectedEndInfo?.code === '0' ? '4' : "");

            const calc = useMemo(() => {
                if (!startDate || !endDate || !currentRule || !activeStartShiftCode || !activeEndShiftCode) return null;
                if (currentRule.isZero) return { isZero: true };

                const standardHrs = currentRule[transport] || 0;
                if (standardHrs === 0) return { error: "不支援此交通方式" };

                const getOverlapMins = (t1Start, t1End, t2Start, t2End) => {
                    const overlapStart = new Date(Math.max(t1Start, t2Start));
                    const overlapEnd = new Date(Math.min(t1End, t2End));
                    const diff = Math.floor((overlapEnd - overlapStart) / 60000);
                    return diff > 0 ? diff : 0;
                };

                const startInfo = SHIFT_TIME_INFO[activeStartShiftCode];
                const startShiftDT = new Date(`${startDate}T${startInfo.start}`);
                const startEndDT = new Date(`${startDate}T${startInfo.end}`);
                if (startEndDT < startShiftDT) startEndDT.setDate(startEndDT.getDate() + 1);

                const goReportDT = new Date(`${startDate}T${goHour.padStart(2, '0')}:${goMin.padStart(2, '0')}`);
                const goDepartDT = new Date(goReportDT.getTime() - standardHrs * 60 * 60 * 1000);
                const goOverlap = getOverlapMins(goDepartDT, goReportDT, startShiftDT, startEndDT);
                const goLeaveMins = (standardHrs * 60) - goOverlap;

                const endInfo = SHIFT_TIME_INFO[activeEndShiftCode];
                const endShiftDT = new Date(`${endDate}T${endInfo.start}`);
                const endEndDT = new Date(`${endDate}T${endInfo.end}`);
                if (endEndDT < endShiftDT) endEndDT.setDate(endEndDT.getDate() + 1);

                const backDepartDT = new Date(`${endDate}T${backHour.padStart(2, '0')}:${backMin.padStart(2, '0')}`);
                const backArrivalDT = new Date(backDepartDT.getTime() + standardHrs * 60 * 60 * 1000);
                const backOverlap = getOverlapMins(backDepartDT, backArrivalDT, endShiftDT, endEndDT);
                const backLeaveMins = (standardHrs * 60) - backOverlap;

                return {
                    standardHrs, goDepartStr: goDepartDT.toTimeString().substring(0, 5), backArrivalStr: backArrivalDT.toTimeString().substring(0, 5),
                    goOverlap, goLeaveMins, backOverlap, backLeaveMins, totalLeaveMins: goLeaveMins + backLeaveMins, isZero: false
                };
            }, [startDate, endDate, goHour, goMin, backHour, backMin, currentRule, transport, activeStartShiftCode, activeEndShiftCode]);

            const formatResult = (mins) => {
                if (mins <= 0) return "0分";
                const h = Math.floor(mins / 60);
                const m = mins % 60;
                return h > 0 ? `${h}小時${m}分` : `${m}分`;
            };

            const renderTimeSelect = (hVal, setH, mVal, setM) => (
                <div className="flex gap-2 items-center">
                    <select className="input-cyber text-center flex-1" value={hVal} onChange={e => setH(e.target.value)}>
                        {[...Array(24).keys()].map(h => <option key={h} value={h.toString().padStart(2, '0')}>{h.toString().padStart(2, '0')}</option>)}
                    </select>
                    <span className="font-bold text-lg">:</span>
                    <select className="input-cyber text-center flex-1" value={mVal} onChange={e => setM(e.target.value)}>
                        {[...Array(60).keys()].map(m => <option key={m} value={m.toString().padStart(2, '0')}>{m.toString().padStart(2, '0')}</option>)}
                    </select>
                </div>
            );

            const manualShiftOptions = Object.entries(SHIFT_TIME_INFO)
                .filter(([code]) => code !== '0')
                .map(([code, info]) => <option key={code} value={code}>{info.name} ({info.start}~{info.end})</option>);

            return (
                <div className="max-w-5xl mx-auto neon-border p-4 md:p-8 rounded-2xl bg-[#0a0c10] shadow-2xl">
                    <h1 className="text-xl md:text-3xl font-black neon-text-cyan mb-6 text-center tracking-widest">路程假精算系統</h1>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-6 border-b border-gray-800 pb-6">
                        <div>
                            <label className="text-xs md:text-sm font-bold text-gray-300 mb-1 block">1. 你的班別</label>
                            <select className="input-cyber" value={shiftType} onChange={e => {setShiftType(e.target.value); setManualStartShift(""); setManualEndShift("");}}>
                                {['A', 'B', 'C', 'D'].map(t => <option key={t} value={t}>{t} 班</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-xs md:text-sm font-bold text-gray-300 mb-1 block">2. 出差地點 (支援別名)</label>
                            <input type="text" className="input-cyber" placeholder="例：林訓 / 台中/ 總處" value={location} onChange={e => setLocation(e.target.value)} />
                        </div>
                        <div>
                            <label className="text-xs md:text-sm font-bold text-gray-300 mb-1 block">3. 交通工具</label>
                            <select className="input-cyber" value={transport} onChange={e => setTransport(e.target.value)}>
                                <option value="TRA">台鐵 {currentRule && !currentRule.isZero ? `(單程 ${currentRule.TRA}H)` : ""}</option>
                                <option value="THSR">高鐵 {currentRule && !currentRule.isZero ? `(單程 ${currentRule.THSR}H)` : ""}</option>
                                <option value="PLANE">飛機 {currentRule && !currentRule.isZero ? `(單程 ${currentRule.PLANE}H)` : ""}</option>
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div className="box-go p-4 md:p-6 rounded-xl">
                            <h2 className="text-lg md:text-xl font-bold neon-text-cyan mb-3 border-b border-cyan-800 pb-2">▶ 去程設定</h2>
                            <div className="space-y-3">
                                <div>
                                    <label className="text-xs font-bold text-cyan-300 mb-1 block">受訓出發日期</label>
                                    <input type="date" className="input-cyber border-cyan-600" value={startDate} onChange={e => {setStartDate(e.target.value); setManualStartShift("");}} />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-cyan-300 mb-1 block">去程報到時間 (24H)</label>
                                    {renderTimeSelect(goHour, setGoHour, goMin, setGoMin)}
                                </div>
                                <div className="bg-black p-3 rounded mt-2 border border-cyan-900">
                                    <div className="text-[11px] md:text-xs text-cyan-500 mb-2">系統偵測：<span className="text-white bg-cyan-900/50 px-2 py-0.5 rounded">{detectedStartInfo?.code === '0' ? "空班(自動切換)" : (detectedStartInfo?.label || "-")}</span></div>
                                    <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-2">
                                        <span className="text-[11px] md:text-xs text-gray-400">手動修正：</span>
                                        <select className="input-cyber py-1 text-[11px] md:text-xs flex-1" value={displayStartManual} onChange={e => setManualStartShift(e.target.value)}>
                                            <option value="">請選擇...</option>{manualShiftOptions}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="box-back p-4 md:p-6 rounded-xl">
                            <h2 className="text-lg md:text-xl font-bold neon-text-orange mb-3 border-b border-orange-800 pb-2">◀ 回程設定</h2>
                            <div className="space-y-3">
                                <div>
                                    <label className="text-xs font-bold text-orange-300 mb-1 block">結訓回程日期</label>
                                    <input type="date" className="input-cyber border-orange-600" value={endDate} onChange={e => {setEndDate(e.target.value); setManualEndShift("");}} />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-orange-300 mb-1 block">回程結束時間 (24H)</label>
                                    {renderTimeSelect(backHour, setBackHour, backMin, setBackMin)}
                                </div>
                                <div className="bg-black p-3 rounded mt-2 border border-orange-900">
                                    <div className="text-[11px] md:text-xs text-orange-500 mb-2">系統偵測：<span className="text-white bg-orange-900/50 px-2 py-0.5 rounded">{detectedEndInfo?.code === '0' ? "空班(自動切換)" : (detectedEndInfo?.label || "-")}</span></div>
                                    <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-2">
                                        <span className="text-[11px] md:text-xs text-gray-400">手動修正：</span>
                                        <select className="input-cyber py-1 text-[11px] md:text-xs flex-1" value={displayEndManual} onChange={e => setManualEndShift(e.target.value)}>
                                            <option value="">請選擇...</option>{manualShiftOptions}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="border-t-2 border-gray-800 pt-6">
                        {calc && calc.isZero ? (
                            <div className="box-red p-6 md:p-8 rounded-lg text-center">
                                <div className="text-2xl md:text-4xl font-black neon-text-red mb-2 tracking-widest">無路程假</div>
                                <div className="text-xs md:text-sm text-gray-400 font-bold">該地點 ({location}) 不符合標準</div>
                            </div>
                        ) : calc && calc.goLeaveMins !== undefined ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 relative bg-[#12161c] p-4 md:p-6 rounded-lg border border-gray-700">
                                <div className="md:absolute top-2 right-4 text-[10px] md:text-xs text-gray-500 font-bold uppercase tracking-wider mb-2 md:mb-0">
                                    區域: {currentRule?.label} | 單程 {calc.standardHrs}H
                                </div>
                                
                                <div className="border-l-4 border-cyan-500 pl-3 md:pl-4">
                                    <div className="text-xs md:text-sm text-cyan-400 font-black mb-1">【去程】路程假</div>
                                    <div className="text-2xl md:text-3xl font-black text-white neon-text-cyan mb-1">{formatResult(calc.goLeaveMins)}</div>
                                    <div className="text-[9px] md:text-[10px] font-mono text-gray-500">
                                        報到 {goHour}:{goMin} 推 {calc.standardHrs}H = {calc.goDepartStr}<br/>重疊扣除：{calc.goOverlap} 分<br/>基準：{SHIFT_TIME_INFO[activeStartShiftCode].name}
                                    </div>
                                </div>

                                <div className="border-l-4 border-orange-500 pl-3 md:pl-4">
                                    <div className="text-xs md:text-sm text-orange-400 font-black mb-1">【回程】路程假</div>
                                    <div className="text-2xl md:text-3xl font-black text-white neon-text-orange mb-1">{formatResult(calc.backLeaveMins)}</div>
                                    <div className="text-[9px] md:text-[10px] font-mono text-gray-500">
                                        搭車 {backHour}:{backMin} 推 {calc.standardHrs}H = {calc.backArrivalStr}<br/>重疊扣除：{calc.backOverlap} 分<br/>基準：{SHIFT_TIME_INFO[activeEndShiftCode].name}
                                    </div>
                                </div>

                                <div className="col-span-1 md:col-span-2 border-t border-gray-700 pt-3 md:pt-4 mt-2 flex flex-col md:flex-row justify-between md:items-end bg-black p-3 md:p-4 rounded">
                                    <span className="text-gray-300 text-xs md:text-sm font-bold tracking-widest mb-1 md:mb-0">本次受訓總計獲得路程假</span>
                                    <span className="text-2xl md:text-3xl font-black text-white" style={{textShadow: '0 0 15px rgba(255,255,255,0.5)'}}>{formatResult(calc.totalLeaveMins)}</span>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-6 md:py-10 text-gray-600 font-bold italic text-sm border border-dashed border-gray-800 rounded-lg">
                                {location ? "--- 系統待命：請選擇去回程日期 ---" : "--- 系統待命：請輸入地點 ---"}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').then(function(registration) {
                    console.log('ServiceWorker PWA Ready!', registration.scope);
                }).catch(function(err) {
                    console.log('ServiceWorker 註冊失敗:', err);
                });
            });
        }
    </script>
</body>
</html>
